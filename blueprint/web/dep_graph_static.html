<script>
let scale = 0.3, tx = 20, ty = 20;  // start zoomed out a bit
const wrap = document.getElementById('svg-wrap');
const cont = document.getElementById('container');
function apply() { wrap.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }
function zoom(f, cx, cy) {
  cx = cx ?? cont.clientWidth/2; cy = cy ?? cont.clientHeight/2;
  tx = cx - f*(cx-tx); ty = cy - f*(cy-ty); scale *= f; apply();
}
function reset() { scale=0.3; tx=20; ty=20; apply(); }
apply();
cont.addEventListener('wheel', e => {
  e.preventDefault();
  const r = cont.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.12 : 0.89, e.clientX-r.left, e.clientY-r.top);
}, {passive:false});
let drag=null;
cont.addEventListener('mousedown', e=>{ drag={x:e.clientX-tx, y:e.clientY-ty}; });
window.addEventListener('mousemove', e=>{ if(drag){tx=e.clientX-drag.x; ty=e.clientY-drag.y; apply();} });
window.addEventListener('mouseup', ()=>{ drag=null; });
</script>
