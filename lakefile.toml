name = "TilingPolyomino"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["TilingPolyomino"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

# The library root does NOT import TilingPolyomino.Abstract (its pedagogical
# definitions must not leak to consumers), so Abstract is listed as an extra
# root to keep the sorry-free contract enforced by every `lake build`.
[[lean_lib]]
name = "TilingPolyomino"
roots = ["TilingPolyomino", "TilingPolyomino.Abstract"]
